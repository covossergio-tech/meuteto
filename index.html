// ========== SUPABASE CLIENT ==========
async function sbGet(table, id) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}&select=*`, {
      headers: getAuthHeader()
    });
    const d = await r.json();
    return d && d[0] ? d[0].data : null;
  } catch { return null; }
}

async function sbUpsert(table, id, data) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: "POST",
      headers: {
        ...getAuthHeader(),
        "Content-Type": "application/json", Prefer: "resolution=merge-duplicates"
      },
      body: JSON.stringify({ id, data })
    });
  } catch {}
}

  _syncing = true;
  try {
    const s = await sbGet("meuteto_dados", "sergio");
    const t = await sbGet("meuteto_dados", "thais");
    const f = await sbGet("meuteto_dados", "favs");

    _lastHash = newHash;

// ========== AUTH ==========
let _session = null;

async function sbSignIn(email, password) {
  try {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: "POST",
      headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();
    if (d.access_token) {
      _session = d;
      localStorage.setItem("mt_session", JSON.stringify(d));
      return { ok: true };
    }
    return { ok: false, msg: d.error_description || "Email ou senha incorretos." };
  } catch { return { ok: false, msg: "Erro de conexão." }; }
}

async function sbSignOut() {
  try {
    if (_session) await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
      method: "POST",
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${_session.access_token}` }
    });
  } catch {}
  _session = null;
  localStorage.removeItem("mt_session");
  localStorage.removeItem("mt_perfil_v5");
  try{sessionStorage.removeItem(UI_SK);}catch(e){}
  STATE.perfil = null;
  render();
}

async function sbRefreshSession() {
  const saved = localStorage.getItem("mt_session");
  if (!saved) return false;
  try {
    const s = JSON.parse(saved);
    if (!s || !s.refresh_token) return false;

    // Verifica se o access_token ainda é válido (expira em 1h)
    const expiresAt = s.expires_at || 0;
    const now = Math.floor(Date.now() / 1000);

    if (expiresAt > now + 60) {
      // Token ainda válido, usa direto
      _session = s;
      return true;
    }

    // Token expirado, faz refresh
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: "POST",
      headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ refresh_token: s.refresh_token })
    });
    const d = await r.json();
    if (d.access_token) {
      _session = d;
      localStorage.setItem("mt_session", JSON.stringify(d));
      return true;
    }
    localStorage.removeItem("mt_session");
    return false;
  } catch {
    // Sem internet — usa sessão salva mesmo assim (modo offline)
    try {
      const s = JSON.parse(localStorage.getItem("mt_session"));
      if (s && s.access_token) { _session = s; return true; }
    } catch {}
    return false;
  }
}

function getAuthHeader() {
  if (!_session) return { apikey: SUPABASE_KEY };
  return { apikey: SUPABASE_KEY, Authorization: `Bearer ${_session.access_token}` };
}

async function initSupabase() {
  // Tenta restaurar sessão salva
  const sessionOk = await sbRefreshSession();
  if (!sessionOk) {
    STATE.sbStatus = "local";
    render();
    // Tenta reconectar a cada 10s se estiver offline
    setTimeout(initSupabase, 10000);
    return;
  }
  STATE.sbStatus = "online";
  STATE.sbReady = true;
  render();
  try {
    // Cria tabela verificando se consegue ler
    const test = await sbGet("meuteto_dados", "sergio");
    if (test) {
      STATE.sergio = {...defP("sergio"), ...test};
      lsSet(SK.s, STATE.sergio);
    } else {
      // Primeira vez — salva dados locais na nuvem
      await sbUpsert("meuteto_dados", "sergio", STATE.sergio);
    }
    const testT = await sbGet("meuteto_dados", "thais");
    if (testT) {
      STATE.thais = {...defP("thais"), ...testT};
      lsSet(SK.t, STATE.thais);
    } else {
      await sbUpsert("meuteto_dados", "thais", STATE.thais);
    }
    const testF = await sbGet("meuteto_dados", "favs");
    if (testF) { STATE.favs = testF; lsSet(SK.f, testF); }
    else { await sbUpsert("meuteto_dados", "favs", STATE.favs); }
    STATE.sbStatus = "online"; STATE.sbReady = true;
    render();
    // Inicia polling inteligente
    startPolling();
  } catch(e) {
    STATE.sbStatus = "local";
    render();
  }
}

function calcTotais(d){
  const mesAtualStr=new Date().toISOString().slice(0,7);
  const diaHoje=new Date().getDate();
  // Budget = soma de TODAS as entradas do mês (recebidas + a receber)
  const totalEntradas=(d.entradas||[]).reduce((s,e)=>s+(parseFloat(String(e.valor).replace(",","."))||0),0);
  const totalEntradasRecebidas=(d.entradas||[]).reduce((s,e)=>{
    const dia=parseInt(e.diaReceb)||0;
    const valor=parseFloat(String(e.valor).replace(",","."))||0;
    return(dia===0||dia<=diaHoje)?s+valor:s;
  },0);
  const totalEntradasPendentes=totalEntradas-totalEntradasRecebidas;
  const budgetTotal=totalEntradas; // teto base ignorado — budget vem só das entradas
  const tF=(d.fixos||[]).filter(f=>(f.mesCobranca||"atual")==="atual").reduce((s,f)=>s+f.valor,0);
  const tV=(d.lancamentos||[]).filter(l=>!isVale(d,l.tipoPag)&&(!l.mesRef||l.mesRef<=mesAtualStr)).reduce((s,l)=>s+l.valor,0);
  const tG=tF+tV;
  return{budgetTotal,totalEntradas,totalEntradasRecebidas,totalEntradasPendentes,tF,tV,tG,saldo:budgetTotal-tG,pct:Math.min(budgetTotal>0?(tG/budgetTotal)*100:0,100)};
}
function calcTotaisProximo(d){
  // Budget próximo mês = saldo deste mês + entradas recorrentes do próximo
  const{saldo}=calcTotais(d);
  const saldoPositivo=Math.max(saldo,0);
  const totalEntradasProx=(d.entradas||[]).filter(e=>e.recorrente).reduce((s,e)=>s+(parseFloat(String(e.valor).replace(",","."))||0),0);
  const budgetTotalProx=saldoPositivo+totalEntradasProx;
  return{saldoTransferido:saldoPositivo,totalEntradasProx,budgetTotalProx};
}

function registrar(item){
  const d=dados();const{tG,teto}=calcTotais(d);
  const vale=isVale(d,item.tipoPag);
  // Calcula mesRef: "Fatura Próximo Mês" → mês seguinte, senão mês atual
  const hoje=new Date();
  const mesAtualStr=hoje.toISOString().slice(0,7);
  const proximoMesDate=new Date(hoje.getFullYear(),hoje.getMonth()+1,1);
  const proximoMesStr=proximoMesDate.toISOString().slice(0,7);
  const faturaProximo=item.fatura==="Fatura Próximo Mês";
  const mesRef=faturaProximo?proximoMesStr:mesAtualStr;
  const nT=tG+(vale||faturaProximo?0:item.valor),ns=teto-nT;
  // Usa a data do evento (dataPag) como data do lançamento, não a data atual
  const dataEvento=item.dataPag?new Date(item.dataPag+"T12:00:00"):new Date();
  const dataStr=dataEvento.toLocaleDateString("pt-BR");
  const hora=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  const novo={id:Date.now(),descricao:item.descricao,valor:item.valor,
    categoria:item.categoria,sub:item.sub||"",tipoPag:item.tipoPag||"",cartao:item.cartao||"",dataPag:item.dataPag||"",
    fatura:item.fatura||"Fatura Atual",mesRef,
    moeda:item.moeda||"",cotacao:item.cotacao||0,iof:item.iof||0,valorMoeda:item.valorMoeda||0,valorMoedaBruto:item.valorMoedaBruto||0,
    data:dataStr,hora};
  setDados(d=>({...d,lancamentos:[novo,...(d.lancamentos||[])]}));
  if(vale){
    const valeObj=(d.vales||[]).find(v=>v.nome===item.tipoPag);
    const gastoVale=(d.lancamentos||[]).filter(l=>l.tipoPag===item.tipoPag).reduce((s,l)=>s+l.valor,0)+item.valor;
    const saldoVale=(valeObj?.saldoInicial||0)-gastoVale;
    showAlerta(`✅ Lançado em ${item.tipoPag}! Saldo do vale: R$ ${fmt(saldoVale)}`,saldoVale<0?"erro":"ok");
    return;
  }
  const p=(nT/teto)*100;
  if(ns<0)showAlerta(`🚨 Teto estourado! R$ ${fmt(Math.abs(ns))} acima.`,"erro");
  else if(p>=90)showAlerta(`⚠️ Atenção! Saldo: R$ ${fmt(ns)}`,"aviso");
  else showAlerta(`✅ Lançado! Saldo disponível: R$ ${fmt(ns)}`,"ok");
}

// ========== OCR CUPOM ==========
function parseCupom(texto,apelidos){
  // Limpa ruídos comuns do Tesseract linha a linha
  texto=texto.split("\n").map(l=>
    l.replace(/^\s*\|+\s*/,"")        // remove | no início da linha
     .replace(/\|/g," ")              // remove | no meio
     .replace(/\s{2,}/g," ")          // colapsa espaços duplos
     .trim()
  ).join("\n");
  const linhas=texto.split("\n").map(l=>l.trim()).filter(Boolean);
  const low=texto.toLowerCase();

  // apelidos cadastrados pelo usuário: se algum trecho do cupom bater, usa o nome customizado
  let desc="";
  for(const a of (apelidos||[])){
    if(a.trecho&&low.includes(a.trecho.toLowerCase())){desc=a.nome;break;}
  }

  // valor: busca linha com TOTAL primeiro (mais confiável)
  let valor=0;
  // Remove ruído (*0,00) antes de processar
  const textoLimpo=texto.replace(/\(\*[\d,\.]+\)/g,"");
  for(const l of textoLimpo.split("\n")){
    if(/(total\s*r?\$?s?|valor\s*pago|valor\s*a\s*pagar)/i.test(l)){
      const m=l.match(/(\d{1,3}(?:[.,]\d{3})*[.,]\d{2})\s*$/);
      if(m){
        const v=parseFloat(m[1].replace(/\./g,"").replace(",","."));
        if(v>0){valor=v;break;}
      }
    }
  }
  // fallback: maior valor que aparece 2+ vezes (o total repete em "Cartao de Credito RS")
  if(!valor){
    const nums=[...textoLimpo.matchAll(/(\d{1,3}(?:[.\s]\d{3})*,\d{2})/g)]
      .map(m=>parseFloat(m[1].replace(/[.\s]/g,"").replace(",",".")))
      .filter(n=>n>0&&n<99999);
    const freq=new Map();
    for(const n of nums)freq.set(n,(freq.get(n)||0)+1);
    let melhor=0,melhorFreq=0;
    for(const [n,c] of freq){
      if(c>melhorFreq||(c===melhorFreq&&n>melhor)){melhor=n;melhorFreq=c;}
    }
    valor=melhor;
  }

  // categoria/sub por palavras-chave
  let cat="Outros",sub="Outros";
  for(const m of MAPA_CATEGORIAS){if(m.k.some(k=>low.includes(k))){cat=m.c;sub=m.s;break;}}

  // Nome do estabelecimento:
  // 1) Apelido cadastrado tem prioridade
  // 2) Razão social: primeiras linhas em MAIÚSCULAS antes do endereço
  if(!desc){
    const primeiras=linhas.slice(0,8).map(l=>{
      // Remove CNPJ inline para não atrapalhar ex: "SONDA SUPERMERCADOS EXP.E IMP. CNPJ - 01.937..."
      return l.replace(/\s*cnpj[\s\-:]*[\d./\-]+.*/i,"").trim();
    }).filter(l=>l.length>3);
    for(const l of primeiras){
      // Pula linhas de endereço, telefone, datas, cabeçalhos fiscais e nomes de shopping
      if(/cnpj|cpf|fone|telefone|^av\b|^rua\b|^r\.\s|avenida|data:|hora:|documento auxiliar|nota fiscal|danfe|nfc|emiss|loja=|pdv|seq=|shopping|^ie:|^ie\s/i.test(l))continue;
      if(!/[a-zA-ZÀ-ÿ]{3,}/.test(l)||l.trim().length<4)continue;
      // Prioriza linhas em MAIÚSCULAS (razão social costuma ser toda em caps)
      const letras=l.replace(/[^a-zA-Z]/g,"");
      const propCaps=letras.length>0?letras.split("").filter(c=>c>="A"&&c<="Z").length/letras.length:0;
      if(propCaps>0.6){desc=l.trim();break;}
    }
    // Fallback: primeira linha com texto útil
    if(!desc){
      for(const l of primeiras){
        if(/[a-zA-ZÀ-ÿ]{3,}/.test(l)&&!/cnpj|cpf|documento auxiliar|nota fiscal|danfe|shopping/i.test(l)){
          desc=l.trim();break;
        }
      }
    }
  }
  if(!desc)desc="Cupom Fiscal";
  desc=desc.replace(/\s+[a-zA-Z]\s*$/,"").trim(); // remove letra única no final (OCR noise)
  desc=desc.replace(/\s+[^a-zA-Z0-9\s]{1,2}\s*$/,"").trim();
  desc=desc.replace(/[^\w\s\-\/\.&'àáâãäéêëíîïóôõöúûüçÀÁÂÃÄÉÊËÍÎÏÓÔÕÖÚÛÜÇ]/g," ").replace(/\s{2,}/g," ").trim();
  if(desc.length>40)desc=desc.slice(0,40).trim();

  const resumo=linhas.filter(l=>/[a-zA-ZÀ-ÿ]/.test(l)).slice(0,4).join(" • ").slice(0,60);

  return {descricao:desc,valor,categoria:cat,sub,resumo};
}


function iniciarVoz(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showAlerta("Voz não disponível. Ative o microfone nas configurações do Safari.","erro");return;}
  const rec=new SR();rec.lang="pt-BR";rec.continuous=false;rec.interimResults=true;
  rec.onstart=()=>{STATE.vozOuvindo=true;render();};
  rec.onend=()=>{STATE.vozOuvindo=false;render();};
  rec.onresult=(e)=>{
    const txt=Array.from(e.results).map(r=>r[0].transcript).join("");
    STATE.vozTexto=txt;
    if(e.results[e.results.length-1].isFinal)interpretarVoz(txt);
    render();
  };
  rec.onerror=()=>{STATE.vozOuvindo=false;showAlerta("Erro no microfone. Ative nas configurações do Safari.","erro");};
  STATE.vozRec=rec;rec.start();
}

function interpretarVoz(txt){
  const low=txt.toLowerCase();
  const mv=low.match(/(\d+[\.,]?\d*)/);
  const valor=mv?parseFloat(mv[1].replace(",",".")):0;
  let cat="Outros",sub="Outros",emoji="💸";

  if(!desc)desc="Gasto por voz";

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="value"&&(tag==="input"||tag==="select"))el.value=v;
    else if(k==="checked")el.checked=v;
    else if(k==="placeholder")el.placeholder=v;
    else if(k==="type")el.type=v;
    else if(v!==false&&v!==null&&v!==undefined)el.setAttribute(k,v);
  });
  children.flat(99).forEach(c=>{
    if(c===null||c===undefined||c===false)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return el;
}

      },

        style:{display:"none"},
        onChange:async e=>{
          const file=e.target.files[0];if(!file)return;
          const reader=new FileReader();
          reader.onload=async ev=>{
            STATE.fotoPreview=ev.target.result;
            STATE.fotoLoading=true;render();
            try{
              if(!window.Tesseract){STATE.fotoResultado=null;showAlerta("Leitor de imagem não carregou. Verifique sua conexão e tente novamente.","erro");STATE.fotoLoading=false;render();return;}
              const imgEl=await new Promise((res,rej)=>{
                const im=new Image();
                im.onload=()=>res(im);
                im.onerror=()=>rej(new Error("imagem inválida"));
                im.src=ev.target.result;
              });
              // redimensiona para no máximo 1600px no maior lado (fotos de galeria costumam ser enormes)
              const MAX=1600;
              let w=imgEl.naturalWidth,h2=imgEl.naturalHeight;
              if(Math.max(w,h2)>MAX){
                const escala=MAX/Math.max(w,h2);
                w=Math.round(w*escala);h2=Math.round(h2*escala);
              }
              const canvas=document.createElement("canvas");
              canvas.width=w;canvas.height=h2;
              canvas.getContext("2d").drawImage(imgEl,0,0,w,h2);
              const dataUrl=canvas.toDataURL("image/jpeg",0.9);

              const result=await Tesseract.recognize(dataUrl,"por");
              const texto=result?.data?.text||"";
              if(!texto.trim())throw new Error("Nenhum texto encontrado na imagem");
              const parsed=parseCupom(texto,dados().apelidos||[]);
              if(!parsed.valor)throw new Error("Não encontrei nenhum valor em R$ no texto");
              STATE.fotoResultado=parsed;
            }catch(e){
              STATE.fotoResultado=null;
              console.error("Erro OCR:",e);
              showAlerta("Não consegui ler o cupom automaticamente ("+(e?.message||"erro desconhecido")+"). Você pode preencher manualmente.","erro");
            }
            STATE.fotoLoading=false;render();
          };
          reader.readAsDataURL(file);
        }
      }),
      STATE.fotoPreview?div({style:{position:"relative",marginBottom:"10px",background:"#000",borderRadius:"10px",overflow:"hidden",maxHeight:"300px"}},
        img({src:STATE.fotoPreview,style:{width:"100%",height:"300px",objectFit:"contain",display:"block"}}),

      STATE.fotoResultado?div({className:"slide",style:{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:"12px",padding:"12px",marginBottom:"10px",textAlign:"left"}},
        p({style:{fontSize:"11px",color:T.green,fontWeight:"700",marginBottom:"6px"}},"✅ Cupom Identificado"),
        ...[["Estabelecimento",STATE.fotoResultado.descricao],["Valor",fmtBRL(STATE.fotoResultado.valor)],["Categoria",`${STATE.fotoResultado.categoria} › ${STATE.fotoResultado.sub}`]].map(([l,v])=>

          )
        ),
        STATE.fotoResultado.resumo?p({style:{fontSize:"10px",color:T.muted,marginTop:"4px",marginBottom:"8px"}},STATE.fotoResultado.resumo):null,
        div({style:{marginBottom:"10px"}},
          p({style:{fontSize:"11px",color:T.sub,marginBottom:"4px"}},"Data Pagamento"),
          inp({type:"date",value:hoje,style:{...inpS,fontSize:"13px"},id:"fotoDataPag"})
        ),
        div({style:{display:"flex",gap:"8px"}},

// ========== ABA DASHBOARD ==========
function abaDashboard(){
  const pf=perfil();const d=dados();
  const{budgetTotal,totalEntradas,totalEntradasRecebidas,totalEntradasPendentes,tG,saldo,pct}=calcTotais(d);
  const sCor=pct>=95?T.red:pct>=80?T.yellow:T.green;
  const diaHoje=new Date().getDate();
  const catTotais={},catSubs={};
  const catTotaisVale={},catSubsVale={};
  [...(d.fixos||[]),...(d.lancamentos||[])].forEach(l=>{
    const c=l.categoria||"Outros",s=l.sub||c;
    const ehVale=isVale(d,l.tipoPag);
    const ehFixo=!l.id||!(d.lancamentos||[]).find(x=>x.id===l.id); // fixos nunca são vale
    if(ehVale&&!ehFixo){
      catTotaisVale[c]=(catTotaisVale[c]||0)+l.valor;
      if(!catSubsVale[c])catSubsVale[c]={};
      catSubsVale[c][s]=(catSubsVale[c][s]||0)+l.valor;
    } else {
      catTotais[c]=(catTotais[c]||0)+l.valor;
      if(!catSubs[c])catSubs[c]={};
      catSubs[c][s]=(catSubs[c][s]||0)+l.valor;
    }
  });
  const totalVales=Object.values(catTotaisVale).reduce((s,v)=>s+v,0);
  return div({className:"fade"},
    div({className:"card",style:{padding:"16px",marginBottom:"10px"}},
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}},
        div({},
          p({style:{fontSize:"11px",color:T.muted,letterSpacing:"2px",textTransform:"uppercase"}},"Gasto de "+pf.nome),
          p({style:{fontFamily:"'Playfair Display',serif",fontSize:"24px",fontWeight:"700",color:sCor,marginTop:"2px"}},fmtBRL(tG)),
          div({style:{marginTop:"4px"}},
            p({style:{fontSize:"12px",color:T.green,fontWeight:"700"}},
              "Budget: "+fmtBRL(budgetTotal)
            ),
            totalEntradasPendentes>0?p({style:{fontSize:"11px",color:"#7c3aed",marginTop:"2px"}},
              "✅ "+fmtBRL(totalEntradasRecebidas)+" recebido · ⏳ "+fmtBRL(totalEntradasPendentes)+" a receber"
            ):totalEntradas>0?p({style:{fontSize:"11px",color:T.green,marginTop:"2px"}},
              "✅ "+fmtBRL(totalEntradas)+" em entradas recebidas"
            ):null,
          ),
        ),
        div({style:{textAlign:"right"}},
          p({style:{fontSize:"10px",color:T.muted}},"Disponível"),
          p({style:{fontSize:"19px",fontWeight:"700",color:saldo>=0?T.green:T.red,marginTop:"2px"}},fmtBRL(Math.abs(saldo)))
        )
      ),
      barra(pct,T.green,sCor)
    ),
    // ── Card Entradas do Mês ──
    (()=>{
      const diaH=new Date().getDate();
      const entradas=d.entradas||[];
      const recebidas=entradas.filter(e=>{const dia=parseInt(e.diaReceb)||0;return dia===0||dia<=diaH;});
      const pendentes=entradas.filter(e=>{const dia=parseInt(e.diaReceb)||0;return dia>diaH;});
      const totalRec=recebidas.reduce((s,e)=>s+e.valor,0);
      const totalPend=pendentes.reduce((s,e)=>s+e.valor,0);
      return div({className:"card",style:{padding:"14px 16px",marginBottom:"10px",borderLeft:"3px solid "+T.green}},
        div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:entradas.length>0?"10px":"0"}},
          div({},
            p({style:{fontSize:"11px",color:T.muted,letterSpacing:"2px",textTransform:"uppercase",fontWeight:"600"}},"Entradas do Mês"),
            entradas.length>0?p({style:{fontSize:"11px",color:T.sub,marginTop:"2px"}},
              "✅ Recebido: "+fmtBRL(totalRec)+(totalPend>0?" · ⏳ A receber: "+fmtBRL(totalPend):"")
            ):p({style:{fontSize:"11px",color:T.muted,marginTop:"2px"}},"Nenhuma entrada ainda")
          ),
          btn({style:{padding:"6px 12px",background:T.green,color:"#fff",fontSize:"11px",fontWeight:"700"},
            onClick:()=>{STATE.modal={tipo:"editEntrada",dados:{id:null,nome:"",valor:"",diaReceb:"",recorrente:true}};render();}
          },"+ Nova"),
          btn({style:{padding:"6px 10px",background:"#f3f4f6",color:T.sub,fontSize:"10px"},
            onClick:()=>{
              const info=(d.entradas||[]).map(e=>`${e.nome}: R$${e.valor} (tipo:${typeof e.valor}) dia:${e.diaReceb||"sem dia"}`).join("\n");
              alert("Entradas salvas:\n\n"+(info||"Nenhuma")+"\n\nHoje: dia "+new Date().getDate());
            }
          },"🔍")
        ),
        entradas.length>0?div({},
          ...(entradas).map(e=>{
            const rec=!e.diaReceb||e.diaReceb<=diaH;
            return div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderTop:"1px solid "+T.border}},
              div({},
                p({style:{fontSize:"12px",fontWeight:"600",color:rec?T.green:"#7c3aed"}},e.nome),
                p({style:{fontSize:"10px",color:T.muted}},(e.diaReceb?"Dia "+e.diaReceb+" · ":"")+(e.recorrente?"Mensal":"Único")+(rec?" · ✅":" · ⏳"))
              ),
              div({style:{display:"flex",alignItems:"center",gap:"6px"}},
                p({style:{fontSize:"13px",fontWeight:"700",color:rec?T.green:"#7c3aed"}},fmtBRL(e.valor)),
                btn({style:{padding:"3px 7px",background:"#f0fdf4",color:T.green,fontSize:"11px"},onClick:()=>{STATE.modal={tipo:"editEntrada",dados:{...e}};render();}},"✎"),
                btn({style:{padding:"3px 7px",background:"#fef2f2",color:T.red,fontSize:"11px"},onClick:()=>{if(confirm("Remover?"))setDados(d=>({...d,entradas:(d.entradas||[]).filter(x=>x.id!==e.id)}));}},"✕")
              )
            );
          }),
        ):null
      );
    })(),
    (()=>{
      const mesAtual=STATE.mesAtual||new Date().toISOString().slice(0,7);
      const lancProximo=(d.lancamentos||[]).filter(l=>l.mesRef&&l.mesRef>mesAtual);
      // Fixos do próximo mês = dois grupos:
      // 1) fixos "atual" projetados para o próximo mês (avança parcela +1)
      // 2) fixos já marcados como "proximo" (parcela permanece igual — já são do próximo mês)
      function avancaParcela(parcela){
        if(!parcela)return{parcelaProx:"",quitado:false};
        const match=parcela.match(/(\d+)\/(\d+)/);
        if(!match)return{parcelaProx:parcela,quitado:false};
        const atual=parseInt(match[1]),total=parseInt(match[2]);
        if(atual>=total)return{parcelaProx:"",quitado:true};
        return{parcelaProx:`${atual+1}/${total}`,quitado:false};
      }
      const fixosAtualProjetados=(d.fixos||[])
        .filter(f=>(f.mesCobranca||"atual")==="atual")
        .map(f=>{const{parcelaProx,quitado}=avancaParcela(f.parcela||"");return{...f,parcelaProx,quitado};})
        .filter(f=>!f.quitado);
      const fixosDirProximo=(d.fixos||[])
        .filter(f=>f.mesCobranca==="proximo")
        .map(f=>({...f,parcelaProx:f.parcela||""}));
      const fixosProximo=[...fixosAtualProjetados,...fixosDirProximo];
      const totalFixosProximo=fixosProximo.reduce((s,f)=>s+f.valor,0);
      const totalVariaveisProximo=lancProximo.reduce((s,l)=>s+l.valor,0);
      const totalProximo=totalFixosProximo+totalVariaveisProximo;
      const{saldoTransferido,totalEntradasProx,budgetTotalProx}=calcTotaisProximo(d);
      const saldoProximo=budgetTotalProx-totalProximo;
      const pctProximo=Math.min((totalProximo/budgetTotalProx)*100,100);
      const corProximo=pctProximo>=95?T.red:pctProximo>=80?T.yellow:"#2563eb";
      return div({style:{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:"14px",padding:"16px",marginBottom:"12px"}},
        div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}},
          div({},
            p({style:{fontSize:"11px",color:"#2563eb",letterSpacing:"2px",textTransform:"uppercase",fontWeight:"600",marginBottom:"2px"}},"📅 Próximo Mês"),
            p({style:{fontSize:"20px",fontWeight:"700",color:"#2563eb",marginBottom:"2px"}},"Budget: "+fmtBRL(budgetTotalProx)),
            saldoTransferido>0?p({style:{fontSize:"11px",color:T.green,marginTop:"2px"}},
              "↩ Saldo este mês: "+fmtBRL(saldoTransferido)
            ):null,
            totalEntradasProx>0?p({style:{fontSize:"11px",color:"#3b82f6",marginTop:"2px"}},
              "✚ Entradas recorrentes: "+fmtBRL(totalEntradasProx)
            ):null,
            p({style:{fontSize:"11px",color:"#3b82f6",marginTop:"4px"}},`Previsto: Fixos ${fmtBRL(totalFixosProximo)} + Faturas ${fmtBRL(totalVariaveisProximo)}`)
          ),
          div({style:{textAlign:"right"}},
            p({style:{fontSize:"10px",color:"#3b82f6"}},"Previsto gastar"),
            p({style:{fontSize:"18px",fontWeight:"700",color:corProximo}},fmtBRL(totalProximo)),
            p({style:{fontSize:"11px",color:"#3b82f6"}},pctProximo.toFixed(0)+"% do budget")
          )
        ),
        div({style:{background:"rgba(255,255,255,0.6)",borderRadius:"6px",height:"8px",overflow:"hidden",marginBottom:"8px"}},
          div({style:{height:"100%",width:`${pctProximo}%`,background:`linear-gradient(90deg,#2563eb,${corProximo})`,borderRadius:"6px",transition:"width 0.5s ease"}})
        ),
        div({style:{display:"flex",justifyContent:"space-between",marginBottom:"8px"}},
          p({style:{fontSize:"11px",color:"#3b82f6"}},"Saldo projetado:"),
          p({style:{fontSize:"13px",fontWeight:"700",color:saldoProximo>=0?"#2563eb":T.red}},fmtBRL(saldoProximo))
        ),
        // Fixos próximo mês (recolhível)
        fixosProximo.length>0?div({style:{background:"rgba(255,255,255,0.5)",borderRadius:"8px",padding:"8px 10px",marginBottom:"6px"}},
          p({style:{fontSize:"11px",color:"#1d4ed8",fontWeight:"600",marginBottom:"4px"}},"📌 Fixos — "+fmtBRL(totalFixosProximo)),
          ...(STATE.expandirFixosProximo?fixosProximo:fixosProximo.slice(0,3)).map(f=>
            div({style:{display:"flex",justifyContent:"space-between",padding:"2px 0"}},
              span({style:{fontSize:"11px",color:"#3b82f6"}},(f.nome||"")+" ("+f.parcelaProx+")"),
              span({style:{fontSize:"11px",fontWeight:"600",color:"#1d4ed8"}},fmtBRL(f.valor))
            )
          ),
          fixosProximo.length>3?div({style:{textAlign:"center",marginTop:"4px"}},
            span({style:{fontSize:"11px",color:"#2563eb",cursor:"pointer",fontWeight:"600"},
              onClick:()=>{STATE.expandirFixosProximo=!STATE.expandirFixosProximo;render();}},
              STATE.expandirFixosProximo?"▲ Recolher":"▼ Ver mais "+(fixosProximo.length-3)+" fixos"
            )
          ):null
        ):null,
        // Lançamentos variáveis próximo mês
        lancProximo.length>0?div({style:{background:"rgba(255,255,255,0.5)",borderRadius:"8px",padding:"8px 10px",marginBottom:"6px"}},
          p({style:{fontSize:"11px",color:"#1d4ed8",fontWeight:"600",marginBottom:"4px"}},"💳 Lançamentos — "+fmtBRL(totalVariaveisProximo)),
          ...(STATE.expandirLancProximo?lancProximo:lancProximo.slice(0,4)).map(l=>
            div({style:{display:"flex",justifyContent:"space-between",padding:"2px 0"}},
              span({style:{fontSize:"11px",color:"#3b82f6"}},(l.descricao||"")+(l.cartao?" · "+l.cartao:"")),
              span({style:{fontSize:"11px",fontWeight:"600",color:"#1d4ed8"}},fmtBRL(l.valor))
            )
          ),
          lancProximo.length>4?div({style:{textAlign:"center",marginTop:"4px"}},
            span({style:{fontSize:"11px",color:"#2563eb",cursor:"pointer",fontWeight:"600"},
              onClick:()=>{STATE.expandirLancProximo=!STATE.expandirLancProximo;render();}},
              STATE.expandirLancProximo?"▲ Recolher":"▼ Ver mais "+(lancProximo.length-4)+" lançamentos"
            )
          ):null
        ):null
      );
    })(),
    p({style:{fontSize:"11px",color:T.muted,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"8px",fontWeight:"600"}},"Por Categoria — toque para detalhar"),
    ...Object.entries(catTotais).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>{
      const cor=CATS[cat]?.cor||T.muted,emoji=CATS[cat]?.emoji||"📦";
      const expanded=STATE.catExpandida===cat;
      return div({style:{marginBottom:"8px"}},
        btn({style:{width:"100%",background:T.card,border:`1px solid ${expanded?cor:T.border}`,borderRadius:"12px",padding:"12px 14px",display:"flex",alignItems:"center",gap:"8px",textAlign:"left"},
          onClick:()=>{STATE.catExpandida=expanded?null:cat;render();}},
          span({style:{fontSize:"20px"}},emoji),
          div({style:{flex:"1"}},
            div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}},
              span({style:{fontSize:"13px",fontWeight:"600",color:T.text}},cat),
              span({style:{fontSize:"14px",fontWeight:"700",color:cor}},fmtBRL(val))
            ),
            barra((val/budgetTotal)*100,cor,cor,"5px")
          ),
          span({style:{fontSize:"12px",color:T.muted}},expanded?"▲":"▼")
        ),
        expanded?div({style:{background:cor+"08",border:`1px solid ${cor}22`,borderRadius:"0 0 12px 12px",padding:"10px 14px",marginTop:"-2px"}},
          ...Object.entries(catSubs[cat]||{}).sort((a,b)=>b[1]-a[1]).map(([s,v])=>
            div({style:{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${cor}15`}},
              span({style:{fontSize:"12px",color:T.sub}},s),
              span({style:{fontSize:"13px",fontWeight:"600",color:cor}},fmtBRL(v))
            )
          )
        ):null
      );
    }),
    // ── Gastos por Vale (não saem do budget do salário) ──
    totalVales>0?div({},
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"14px 0 8px"}}
        ,p({style:{fontSize:"11px",color:"#059669",letterSpacing:"2px",textTransform:"uppercase",fontWeight:"600"}},"Gastos por Vale — não afetam o budget")
        ,p({style:{fontSize:"12px",fontWeight:"700",color:"#059669"}},fmtBRL(totalVales))
      ),
      ...Object.entries(catTotaisVale).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>{
        const cor=CATS[cat]?.cor||"#059669",emoji=CATS[cat]?.emoji||"💳";
        const expandedV=STATE.catExpandidaVale===cat;
        return div({style:{marginBottom:"8px"}},
          btn({style:{width:"100%",background:"#f0fdf4",border:`1px solid ${expandedV?"#059669":"#bbf7d0"}`,borderRadius:"12px",padding:"12px 14px",display:"flex",alignItems:"center",gap:"8px",textAlign:"left"},
            onClick:()=>{STATE.catExpandidaVale=expandedV?null:cat;render();}},
            span({style:{fontSize:"20px"}},emoji),
            div({style:{flex:"1"}},
              div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}},
                span({style:{fontSize:"13px",fontWeight:"600",color:T.text}},cat),
                span({style:{fontSize:"14px",fontWeight:"700",color:"#059669"}},fmtBRL(val))
              ),
              barra(100,"#059669","#059669","5px")
            ),
            span({style:{fontSize:"12px",color:T.muted}},expandedV?"▲":"▼")
          ),
          expandedV?div({style:{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:"0 0 12px 12px",padding:"10px 14px",marginTop:"-2px"}},

// ========== ABA FIXOS ==========
function abaFixos(){
  const pf=perfil();const d=dados();
  const fixosAtual=(d.fixos||[]).filter(f=>(f.mesCobranca||"atual")==="atual");
  const fixosProximo=(d.fixos||[]).filter(f=>f.mesCobranca==="proximo");
  const tF=fixosAtual.reduce((s,f)=>s+f.valor,0);
  const tFP=fixosProximo.reduce((s,f)=>s+f.valor,0);
  const renderFixo=f=>{
    const cor=CATS[f.categoria]?.cor||T.muted;
    const tipoCor=f.tipoPag==="Cartão de Crédito"?"#2563eb":f.tipoPag==="PIX"?"#059669":f.tipoPag==="Débito Automático"?"#7c3aed":T.muted;
    return div({className:"card",style:{padding:"12px 14px",marginBottom:"8px"}},
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
        div({style:{flex:"1"}},
          p({style:{fontSize:"13px",fontWeight:"600"}},f.nome),
          div({style:{display:"flex",gap:"4px",marginTop:"4px",flexWrap:"wrap"}},
            tagEl(f.sub||f.categoria,cor),
            tagEl(f.tipoPag||"",tipoCor),
            f.parcela?tagEl("Parc "+f.parcela,"#9ca3af"):null
          )
        ),
        div({style:{display:"flex",alignItems:"center",gap:"6px",marginLeft:"8px"}},
          p({style:{fontSize:"15px",fontWeight:"700",color:T.yellow}},fmtBRL(f.valor)),
          btn({style:{padding:"4px 8px",background:pf.corBg,color:pf.cor,fontSize:"12px"},onClick:()=>{STATE.modal={tipo:"editFixo",dados:{...f}};render();}},"✎"),
          btn({style:{padding:"4px 8px",background:"#fef2f2",color:T.red,fontSize:"12px"},onClick:()=>{if(confirm("Remover?"))setDados(d=>({...d,fixos:(d.fixos||[]).filter(x=>x.id!==f.id)}));}},"✕")
        )
      )
    );
  };
  return div({className:"fade"},
    div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},
      div({},
        p({style:{fontSize:"11px",color:T.muted,letterSpacing:"2px",textTransform:"uppercase",fontWeight:"600"}},"Fixos — "+pf.nome),
        p({style:{fontSize:"12px",color:T.yellow,fontWeight:"700"}},fmtBRL(tF)+(tFP>0?" · Próx: "+fmtBRL(tFP):""))
      ),
      btn({style:{padding:"7px 12px",background:pf.cor,color:"#fff",fontSize:"11px",fontWeight:"700"},
        onClick:()=>{STATE.modal={tipo:"editFixo",dados:{id:null,nome:"",valor:"",categoria:"Alimentação",sub:"Mercado",parcela:"",mesCobranca:"atual",tipoPag:"Cartão de Crédito",cartao:""}};render();}
      },"+ Novo")
    ),
    fixosAtual.length>0?div({},
      p({style:{fontSize:"11px",color:T.muted,letterSpacing:"1px",textTransform:"uppercase",fontWeight:"600",marginBottom:"6px"}},"Este mês"),
      ...fixosAtual.map(renderFixo)
    ):null,
    fixosProximo.length>0?div({style:{marginTop:"14px"}},
      p({style:{fontSize:"11px",color:"#7c3aed",letterSpacing:"1px",textTransform:"uppercase",fontWeight:"600",marginBottom:"6px"}},"Próximo mês"),
      ...fixosProximo.map(renderFixo)
    ):null,
    fixosAtual.length===0&&fixosProximo.length===0?div({className:"card",style:{padding:"20px",textAlign:"center"}},
      p({style:{color:T.muted,fontSize:"12px"}},"Nenhum gasto fixo cadastrado")
    ):null
  );
}

  );

function abaArquivo(){
  const pf=perfil();const d=dados();
  const historico=(d.historico||[]).slice().reverse(); // mais recente primeiro
  return div({className:"fade"},
    div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},
      div({},
        p({style:{fontSize:"11px",color:T.muted,letterSpacing:"2px",textTransform:"uppercase",fontWeight:"600"}},"Histórico — "+pf.nome),
        p({style:{fontSize:"11px",color:T.muted,marginTop:"2px"}},historico.length+" mês(es) arquivado(s)")
      ),
      div({style:{display:"flex",gap:"8px"}},
        historico.length>0?btn({style:{padding:"7px 12px",background:"#16a34a",color:"#fff",fontSize:"11px",fontWeight:"700"},
          onClick:()=>exportarExcel(pf.nome,d)
        },"📊 Excel"):null,
        temBackup(STATE.perfil)?btn({style:{padding:"7px 12px",background:"#eff6ff",color:"#2563eb",fontSize:"11px",fontWeight:"700",border:"1px solid #bfdbfe"},
          onClick:()=>{
            const bk=restaurarBackup(STATE.perfil);
            if(!bk){showAlerta("Nenhum backup encontrado.","erro");return;}
            const dataStr=new Date(bk.ts).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
            if(!confirm(`Restaurar backup de ${dataStr}?\n\nIsso vai reverter o fechamento do mês e voltar ao estado anterior.`))return;
            if(STATE.perfil==="sergio")STATE.sergio=bk.dados;
            else STATE.thais=bk.dados;
            if(bk.mesAtual)STATE.mesAtual=bk.mesAtual;
            syncSave(STATE.perfil,bk.dados).then(()=>{
              render();
              showAlerta("✅ Backup restaurado com sucesso!","ok");
            }).catch(()=>{
              // mesmo se Supabase falhar, localStorage já foi salvo pelo syncSave
              render();
              showAlerta("✅ Backup restaurado! (sincronizando...)","ok");
            });
          }
        },"↩ Restaurar backup"):null
      )
    ),
    historico.length===0?div({className:"card",style:{padding:"32px",textAlign:"center"}},
      span({style:{fontSize:"36px"}},"🗂️"),
      p({style:{color:T.muted,fontSize:"13px",marginTop:"8px"}},"Nenhum mês arquivado ainda"),
      p({style:{color:T.muted,fontSize:"12px",marginTop:"4px"}},"Feche o mês no 📋 para arquivar")
    ):div({},
      ...historico.map(mes=>{
        const totalVar=(mes.lancamentos||[]).reduce((s,l)=>s+l.valor,0);
        const totalFix=(mes.fixos||[]).reduce((s,f)=>s+f.valor,0);

function formatarMes(yyyymm){
  if(!yyyymm)return"?";
  const [y,m]=yyyymm.split("-");
  const nomes=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  return (nomes[parseInt(m)-1]||m)+" / "+y;
}

function exportarExcel(nome,d){
  const historico=d.historico||[];
  if(historico.length===0){showAlerta("Nenhum mês arquivado para exportar.","aviso");return;}

  // Usa SheetJS se disponível, senão cai para CSV
  const XLSX=window.XLSX;
  if(XLSX){
    const rows=[["Mês","Tipo","Descrição","Categoria","Subcategoria","Forma Pagamento","Cartão","Data","Valor (R$)"]];
    historico.forEach(mes=>{
      const m=formatarMes(mes.mes);
      (mes.fixos||[]).forEach(f=>{
        rows.push([m,"Fixo",f.nome,f.categoria,f.sub||"",f.tipoPag||"",f.cartao||"",mes.fechadoEm||"",f.valor]);
      });
      (mes.lancamentos||[]).forEach(l=>{
        rows.push([m,"Variável",l.descricao||"",l.categoria,l.sub||"",l.tipoPag||"",l.cartao||"",l.data||"",l.valor]);
      });
    });
    const ws=XLSX.utils.aoa_to_sheet(rows);
    // Formata coluna de valor como moeda
    const range=XLSX.utils.decode_range(ws["!ref"]);
    for(let r=1;r<=range.e.r;r++){
      const cell=ws[XLSX.utils.encode_cell({r,c:8})];
      if(cell&&typeof cell.v==="number")cell.z="R$ #,##0.00";
    }
    ws["!cols"]=[{wch:12},{wch:8},{wch:35},{wch:16},{wch:20},{wch:20},{wch:16},{wch:12},{wch:12}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Lançamentos");
    // Aba de resumo por categoria
    const catMap={};
    historico.forEach(mes=>{
      const m=formatarMes(mes.mes);
      [...(mes.fixos||[]),...(mes.lancamentos||[])].forEach(l=>{
        const k=m+"||"+(l.categoria||"Outros");
        catMap[k]=(catMap[k]||0)+l.valor;
      });
    });
    const rows2=[["Mês","Categoria","Total (R$)"]];
    Object.entries(catMap).forEach(([k,v])=>{const[m,c]=k.split("||");rows2.push([m,c,v]);});
    const ws2=XLSX.utils.aoa_to_sheet(rows2);
    ws2["!cols"]=[{wch:12},{wch:20},{wch:14}];
    XLSX.utils.book_append_sheet(wb,ws2,"Por Categoria");
    XLSX.writeFile(wb,`MeuTeto_${nome}_${new Date().getFullYear()}.xlsx`);
    showAlerta("✅ Excel baixado com sucesso!","ok");
  } else {
    // Fallback CSV
    let csv="Mês;Tipo;Descrição;Categoria;Subcategoria;Tipo Pagamento;Cartão;Data;Valor\n";
    historico.forEach(mes=>{
      const m=formatarMes(mes.mes);
      (mes.fixos||[]).forEach(f=>{csv+=`${m};Fixo;${f.nome};${f.categoria};${f.sub||""};${f.tipoPag||""};${f.cartao||""};${mes.fechadoEm||""};${f.valor.toFixed(2).replace(".",",")}\n`;});
      (mes.lancamentos||[]).forEach(l=>{csv+=`${m};Variável;${l.descricao||""};${l.categoria};${l.sub||""};${l.tipoPag||""};${l.cartao||""};${l.data||""};${l.valor.toFixed(2).replace(".",",")}\n`;});
    });
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`MeuTeto_${nome}_${new Date().getFullYear()}.csv`;
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
    showAlerta("✅ CSV baixado! Abra no Excel.","ok");
  }
}

const BK_PREFIX="mt_backup_";
function salvarBackup(perfil,d){
  try{
    const bk={ts:new Date().toISOString(),mesAtual:STATE.mesAtual,dados:JSON.parse(JSON.stringify(d))};
    localStorage.setItem(BK_PREFIX+perfil,JSON.stringify(bk));
    return bk.ts;
  }catch(e){return null;}
}
function restaurarBackup(perfil){
  try{const raw=localStorage.getItem(BK_PREFIX+perfil);if(!raw)return null;return JSON.parse(raw);}catch(e){return null;}
}
function temBackup(perfil){return !!localStorage.getItem(BK_PREFIX+perfil);}

// ========== RENDER PRINCIPAL ==========
function closeModal(){STATE.modal=null;try{sessionStorage.removeItem(UI_SK);}catch(e){}render();}


const UI_SK = "meuteto_ui_state";
function captureFormValues(){
  // Captura TODOS os inputs/selects/textareas do DOM e atualiza STATE.form e STATE.modal.dados
  try{
    document.querySelectorAll("input,select,textarea").forEach(el=>{
      const v=el.type==="checkbox"?el.checked:el.value;
      // data-field → STATE.form
      const ff=el.getAttribute("data-field");
      if(ff&&STATE.form&&ff in STATE.form)STATE.form[ff]=v;
      // data-mfield → STATE.modal.dados (campos do modal)
      const mf=el.getAttribute("data-mfield");
      if(mf&&STATE.modal&&STATE.modal.dados)STATE.modal.dados[mf]=v;
    });
  }catch(e){}
}
function saveUiState(){
  try{
    captureFormValues();
    const snap={
      aba:STATE.aba,
      modal:STATE.modal,
      form:STATE.form,
      modoEntrada:STATE.modoEntrada,
    };
    sessionStorage.setItem(UI_SK, JSON.stringify(snap));
  }catch(e){}
}
function restoreUiState(){
  try{
    const raw=sessionStorage.getItem(UI_SK);
    if(!raw)return;
    const snap=JSON.parse(raw);
    if(snap.aba)STATE.aba=snap.aba;
    if(snap.form){
      STATE.form={...STATE.form,...snap.form};
      if(!STATE.form.dataPag)STATE.form.dataPag=new Date().toISOString().split("T")[0];
    }
    if(snap.modal)STATE.modal=snap.modal;
    if(snap.modoEntrada)STATE.modoEntrada=snap.modoEntrada;
  }catch(e){}
}
restoreUiState();
// Salva ao sair do app (múltiplos eventos para cobrir iOS/Android)
document.addEventListener("visibilitychange",()=>{if(document.hidden)saveUiState();});
window.addEventListener("pagehide",()=>saveUiState());
window.addEventListener("blur",()=>saveUiState());
// Salva a cada digitação para não perder nada
document.addEventListener("input",()=>saveUiState(),{passive:true});
document.addEventListener("change",()=>saveUiState(),{passive:true});


function render(){
  const app=document.getElementById("app");
  // preserva o foco/cursor de um input durante o re-render (evita "saltar" do campo a cada tecla)
  const active=document.activeElement;
  let focusInfo=null;
  if(active&&app.contains(active)&&active.hasAttribute("data-fkey")){
    focusInfo={key:active.getAttribute("data-fkey"),start:active.selectionStart,end:active.selectionEnd};
  }
  while(app.firstChild)app.removeChild(app.firstChild);
  // Verifica autenticação
  if(!_session){
    if(STATE.telaAlterarSenha){app.appendChild(telaAlterarSenhaInline());return;}
    app.appendChild(telaLogin());return;
  }
  if(!STATE.perfil){app.appendChild(telaSel());return;}
  const pf=perfil();const{saldo,pct}=calcTotais(dados());
  const conteudoMap={rapido:abaRapido,dashboard:abaDashboard,fixos:abaFixos,cartoes:abaCartoes,historico:abaHistorico,arquivo:abaArquivo,consolidado:abaConsolidado};
  const conteudo=(conteudoMap[STATE.aba]||abaRapido)();
  app.appendChild(headerEl());
  const al=alertaEl();if(al)app.appendChild(al);
  app.appendChild(div({style:{maxWidth:"480px",margin:"0 auto",padding:"0 16px"}},
    abasEl(),
    div({style:{marginTop:"10px"}},conteudo),
    p({style:{marginTop:"14px",textAlign:"center",fontSize:"11px",color:T.muted,paddingBottom:"8px"}},
      `${pf.nome} · Saldo: ${fmtBRL(saldo)} · ${pct.toFixed(0)}% usado`
    )
  ));
  const mo=modalEl();if(mo)app.appendChild(mo);
  if(focusInfo){
    const el=app.querySelector(`[data-fkey="${focusInfo.key}"]`);
    if(el){el.focus();try{el.setSelectionRange(focusInfo.start,focusInfo.end);}catch(e){}}
  }
}

render();

// Handler foto — precisa ser re-attached após cada render

// ========== AUTO LOGOUT POR INATIVIDADE ==========
let _inactivityTimer = null;
const INACTIVITY_LIMIT = 5 * 60 * 1000; // 5 minutos

function resetInactivityTimer() {
  if (_inactivityTimer) clearTimeout(_inactivityTimer);
  if (!_session) return;
  _inactivityTimer = setTimeout(() => {
    sbSignOut();
    showAlerta && alert("Sessão encerrada por inatividade. Faça login novamente.");
  }, INACTIVITY_LIMIT);
}

// Monitora qualquer interação do usuário
["touchstart","touchend","click","keydown","scroll"].forEach(ev => {
  document.addEventListener(ev, resetInactivityTimer, {passive:true});
});

// Inicia o timer
resetInactivityTimer();

// Logout automático quando tela fica bloqueada por muito tempo
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") {
    // Registra quando saiu
    localStorage.setItem("mt_hidden_at", Date.now());
  } else {
    // Verifica quanto tempo ficou em segundo plano
    const hiddenAt = parseInt(localStorage.getItem("mt_hidden_at") || "0");
    const elapsed = Date.now() - hiddenAt;
    if (hiddenAt && elapsed > INACTIVITY_LIMIT && _session) {
      sbSignOut();
      localStorage.removeItem("mt_hidden_at");
    } else {
      resetInactivityTimer();
      if (STATE.sbReady) syncDados(true);
    }
  }
});
</script>
</body>
</html>
